<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>foxcub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header>
      <h1>foxcub</h1>
    </header>

    <form id="new-form">
      <input
        id="new-name"
        type="text"
        placeholder="Project name"
        autocomplete="off"
        autofocus
      />
      <button id="new-btn" type="submit">New</button>
    </form>

    <section>
      <ul id="project-list" class="project-list"></ul>
      <p id="list-empty" class="empty" hidden>No projects</p>
    </section>

    <p id="error" class="error" hidden></p>

    <script src="popup.js"></script>
  </body>
</html>
